<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitPlan — Printable Workout Sheets</title>
  <style>
    @page { size: A4; margin: 15mm; }
    @media print {
      .no-print { display: none !important; }
      .print-page { page-break-after: always; }
      .print-page:last-child { page-break-after: auto; }
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }

    :root {
      --orange: #d95f2b;
      --green: #2e9e6b;
      --blue: #2980b9;
      --purple: #7c4daa;
      --grey: #6b7280;
      --text: #111827;
      --text-soft: #6b7280;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Segoe UI', Helvetica, sans-serif; color: var(--text); background: #f5f5f5; }

    /* ── CONTROLS (screen only) ── */
    .controls {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 16px 24px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .controls h1 {
      font-size: 1.1rem; font-weight: 800; color: #f4a07a; margin-right: auto;
    }
    .controls label { font-size: 0.82rem; color: rgba(255,255,255,0.7); font-weight: 600; }
    .controls select {
      padding: 6px 12px; border-radius: 8px; border: none;
      font-size: 0.82rem; font-weight: 600; background: rgba(255,255,255,0.1);
      color: white; cursor: pointer;
    }
    .controls select option { background: #1a1a2e; color: white; }
    .btn {
      padding: 8px 20px; border-radius: 8px; border: none;
      font-size: 0.82rem; font-weight: 700; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-print { background: var(--orange); color: white; }
    .btn-print:hover { background: #c4521f; transform: translateY(-1px); }
    .btn-back { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
    .btn-back:hover { background: rgba(255,255,255,0.15); color: white; }

    /* ── PRINT PAGE ── */
    .print-page {
      background: white;
      max-width: 210mm;
      margin: 16px auto;
      padding: 20mm 18mm;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border-radius: 4px;
    }

    /* ── DAY HEADER ── */
    .day-header {
      display: flex; align-items: center; gap: 12px;
      padding-bottom: 12px; margin-bottom: 14px;
      border-bottom: 3px solid var(--orange);
    }
    .day-header.cardio { border-color: var(--blue); }
    .day-header.recovery { border-color: var(--green); }
    .day-header.rest { border-color: var(--grey); }
    .day-header.endurance { border-color: var(--purple); }

    .day-badge {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 800; color: white;
      background: var(--orange); flex-shrink: 0;
    }
    .day-badge.cardio { background: var(--blue); }
    .day-badge.recovery { background: var(--green); }
    .day-badge.rest { background: var(--grey); }
    .day-badge.endurance { background: var(--purple); }

    .day-header h2 { font-size: 1.2rem; font-weight: 800; }
    .day-header .subtitle { font-size: 0.78rem; color: var(--text-soft); margin-top: 2px; }

    .week-label {
      margin-left: auto; font-size: 0.75rem; font-weight: 700;
      padding: 4px 12px; border-radius: 20px;
      background: #f3f4f6; color: var(--text-soft);
    }

    /* ── EXERCISE TABLE ── */
    .ex-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
    .ex-table th {
      text-align: left; font-size: 0.65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-soft); padding: 6px 8px;
      border-bottom: 2px solid #e5e7eb;
    }
    .ex-table td {
      font-size: 0.78rem; padding: 7px 8px;
      border-bottom: 1px solid #f3f4f6;
      vertical-align: top;
    }
    .ex-table tr:last-child td { border-bottom: none; }
    .ex-table .ex-name { font-weight: 600; min-width: 160px; }
    .ex-table .ex-detail { color: var(--text-soft); font-size: 0.72rem; }
    .ex-table .ex-sets { font-weight: 600; white-space: nowrap; }
    .ex-table .checkbox-col { width: 28px; text-align: center; }
    .checkbox-box {
      width: 16px; height: 16px; border: 2px solid #d1d5db;
      border-radius: 4px; display: inline-block;
    }

    .ex-table tr.warmup td { background: #fff7ed; }
    .ex-table tr.cooldown td { background: #eff6ff; }
    .ex-table tr.flex td { background: #fdf4ff; }
    .ex-table tr.hiit td { background: #fef2f2; }

    /* ── SECTION DIVIDER ── */
    .section-divider {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-soft);
      margin: 16px 0 8px; padding-left: 8px;
      border-left: 3px solid var(--orange);
    }

    /* ── MEAL TABLE ── */
    .meal-table { width: 100%; border-collapse: collapse; }
    .meal-table th {
      text-align: left; font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; padding: 8px; background: #f9fafb;
      border-bottom: 2px solid #e5e7eb; color: var(--text-soft);
    }
    .meal-table td {
      font-size: 0.78rem; padding: 8px;
      border-bottom: 1px solid #f3f4f6;
    }
    .meal-table .day-col { font-weight: 700; width: 50px; }
    .meal-table .emoji { font-size: 1rem; }

    /* ── NOTES AREA ── */
    .notes-area {
      margin-top: 16px; padding-top: 12px;
      border-top: 1px dashed #d1d5db;
    }
    .notes-area h4 {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      color: var(--text-soft); margin-bottom: 6px;
    }
    .notes-lines {
      display: flex; flex-direction: column; gap: 14px;
    }
    .notes-lines .line {
      border-bottom: 1px solid #e5e7eb; height: 1px;
    }

    /* ── FOOTER ── */
    .page-footer {
      margin-top: 16px; padding-top: 8px;
      border-top: 1px solid #e5e7eb;
      display: flex; justify-content: space-between;
      font-size: 0.65rem; color: #9ca3af;
    }
  </style>
</head>

  { day: 'Sun', breakfast: '🍜 Idiyappam (3) + coconut milk ½ cup ~300cal', lunch: '🍛 Rice (1 cup) + sambar + rasam + kootu ~480cal', dinner: '🥣 Khichdi (1 cup) + papad + pickle ~320cal', snack: '📦 Prep snacks (boil eggs) ~50cal' },
];

const BADGE_COLORS = { strength: '#d95f2b', cardio: '#2980b9', recovery: '#2e9e6b', rest: '#6b7280', endurance: '#7c4daa' };
const DAY_NAMES = { Mon:'Monday', Tue:'Tuesday', Wed:'Wednesday', Thu:'Thursday', Fri:'Friday', Sat:'Saturday', Sun:'Sunday' };

function buildDayPage(sched, week) {
  const color = BADGE_COLORS[sched.badge];
  return `<div class="print-page">
    <div class="day-header ${sched.badge}">
      <div class="day-badge ${sched.badge}">${sched.icon}</div>
      <div>
        <h2>${DAY_NAMES[sched.day]} — ${sched.title}</h2>
        <div class="subtitle">4-Week Progressive Plan · Dumbbells up to 10 kg</div>
      </div>
      <div class="week-label">Week ${week}</div>
    </div>
    <table class="ex-table">
      <thead>
        <tr>
          <th class="checkbox-col">✓</th>
          <th>Exercise</th>
          <th>Details</th>
          <th>Sets / Duration</th>
        </tr>
      </thead>
      <tbody>
        ${sched.exercises.map(ex => `
          <tr class="${ex.type || ''}">
            <td class="checkbox-col"><span class="checkbox-box"></span></td>
            <td class="ex-name">${ex.name}</td>
            <td class="ex-detail">${ex.detail}</td>
            <td class="ex-sets">${ex.sets[week]}</td>
          </tr>`).join('')}
      </tbody>
    </table>
    <div style="display:flex;gap:8px;margin-top:14px;font-size:0.72rem;">
      <div style="flex:1;padding:6px 10px;border-radius:6px;background:#fff7ed;text-align:center;"><strong>🔥 1400–1500 cal</strong></div>
      <div style="flex:1;padding:6px 10px;border-radius:6px;background:#ecfdf5;text-align:center;"><strong>🥩 70g+ protein</strong></div>
      <div style="flex:1;padding:6px 10px;border-radius:6px;background:#eff6ff;text-align:center;"><strong>💧 3L water</strong></div>
      <div style="flex:1;padding:6px 10px;border-radius:6px;background:#f3ecfb;text-align:center;"><strong>👟 8000+ steps</strong></div>
    </div>
    <div class="notes-area">
      <h4>Notes / Weight Log</h4>
      <div class="notes-lines">
        <div class="line"></div><div class="line"></div><div class="line"></div>
      </div>
    </div>
    <div class="page-footer">
      <span>FitPlan — ${DAY_NAMES[sched.day]}, Week ${week}</span>
      <span>Date: _______________ Weight: _______ kg</span>
    </div>
  </div>`;
}

function buildMealPage() {
  return `<div class="print-page">
    <div class="day-header" style="border-color: #2e9e6b;">
      <div class="day-badge" style="background: #2e9e6b;">🥗</div>
      <div>
        <h2>Weekly Meal Plan</h2>
        <div class="subtitle">South Indian rotation · Simple · Batch-cook friendly</div>
      </div>
    </div>
    <table class="meal-table">
      <thead>
        <tr><th>Day</th><th>Breakfast</th><th>Lunch</th><th>Dinner</th><th>Snack</th></tr>
      </thead>
      <tbody>
        ${MEALS.map(m => `
          <tr>
            <td class="day-col">${m.day}</td>
            <td>${m.breakfast}</td>
            <td>${m.lunch}</td>
            <td>${m.dinner}</td>
            <td>${m.snack}</td>
          </tr>`).join('')}
      </tbody>
    </table>
    <div class="section-divider" style="border-color: #2e9e6b; margin-top: 20px;">Sunday Prep (45 min)</div>
    <table class="ex-table" style="margin-top: 8px;">
      <tbody>
        <tr><td class="checkbox-col"><span class="checkbox-box"></span></td><td>Boil 8 eggs for the week</td><td></td><td></td></tr>
        <tr><td class="checkbox-col"><span class="checkbox-box"></span></td><td>Make big pot of sambar</td><td></td><td></td></tr>
        <tr><td class="checkbox-col"><span class="checkbox-box"></span></td><td>Soak / buy idli-dosa batter</td><td></td><td></td></tr>
        <tr><td class="checkbox-col"><span class="checkbox-box"></span></td><td>Chop onions, tomatoes, veggies</td><td></td><td></td></tr>
        <tr><td class="checkbox-col"><span class="checkbox-box"></span></td><td>Cook toor dal in bulk</td><td></td><td></td></tr>
      </tbody>
    </table>
    <div class="section-divider" style="border-color: #2e9e6b;">Quick Reminders</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;font-size:0.78rem;">
      <div><strong>Protein:</strong> 2 eggs with any meal, curd every lunch, rajma/chickpea 2×/week</div>
      <div><strong>Hydration:</strong> You: 2.5–3L/day, husband: 1L bottle on desk, reminder every 90 min</div>
      <div><strong>Snacks:</strong> Roasted groundnuts, banana, buttermilk, dates (2–3), boiled eggs</div>
      <div><strong>Progressive Overload:</strong> W1: 4×6 → W2: 4×7 → W3: 4×8 → W4: +0.5–1kg back to 4×6</div>
    </div>
    <div class="page-footer" style="margin-top: 24px;">
      <span>FitPlan — Weekly Meal Plan</span>
      <span>Pin in kitchen!</span>
    </div>
  </div>`;
}

function render() {
  const view = document.getElementById('viewSelect').value;
  let html = '';

  if (view === 'meals') {
    html = buildMealPage();
  } else if (view === 'all') {
    for (let w = 1; w <= 4; w++) {
      SCHEDULE.forEach(s => { html += buildDayPage(s, w); });
    }
    html += buildMealPage();
  } else {
    const w = parseInt(view);
    SCHEDULE.forEach(s => { html += buildDayPage(s, w); });
    html += buildMealPage();
  }

  document.getElementById('pages').innerHTML = html;
}

render();
</script>
</body>
</html>
