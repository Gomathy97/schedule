<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitPlan — Printable Workout Sheets</title>
  <style>
    @page { size: A4 landscape; margin: 4mm 6mm; }
    @media print {
      .no-print { display: none !important; }
      .print-pair { page-break-after: always; page-break-inside: avoid; box-shadow: none !important; padding: 3mm 5mm; }
      .print-pair:last-child { page-break-after: auto; }
      .print-page { box-shadow: none !important; border-radius: 0 !important; margin: 0 !important; }
      .print-page-full { page-break-after: always; page-break-inside: avoid; padding: 2mm 5mm !important; margin: 0 !important; box-shadow: none !important; border-radius: 0 !important; }
      .print-page-full:last-child { page-break-after: auto; }
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: white; }
    }

    :root {
      --orange: #d95f2b;
      --green: #2e9e6b;
      --blue: #2980b9;
      --purple: #7c4daa;
      --grey: #6b7280;
      --text: #111827;
      --text-soft: #6b7280;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Segoe UI', Helvetica, sans-serif; color: var(--text); background: #f5f5f5; }

    /* ── CONTROLS (screen only) ── */
    .controls {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 16px 24px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .controls h1 {
      font-size: 1.1rem; font-weight: 800; color: #f4a07a; margin-right: auto;
    }
    .controls label { font-size: 0.82rem; color: rgba(255,255,255,0.7); font-weight: 600; }
    .controls select {
      padding: 6px 12px; border-radius: 8px; border: none;
      font-size: 0.82rem; font-weight: 600; background: rgba(255,255,255,0.1);
      color: white; cursor: pointer;
    }
    .controls select option { background: #1a1a2e; color: white; }
    .btn {
      padding: 8px 20px; border-radius: 8px; border: none;
      font-size: 0.82rem; font-weight: 700; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-print { background: var(--orange); color: white; }
    .btn-print:hover { background: #c4521f; transform: translateY(-1px); }
    .btn-back { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
    .btn-back:hover { background: rgba(255,255,255,0.15); color: white; }

    /* ── TWO-UP PAIR (two days side by side on one landscape page) ── */
    .print-pair {
      display: flex; flex-wrap: wrap; gap: 0;
      max-width: 297mm;
      margin: 12px auto;
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border-radius: 4px;
      padding: 5mm 6mm;
    }
    .print-pair .pair-content {
      display: flex; gap: 8px; width: 100%; align-items: start;
    }
    .print-pair .print-page {
      flex: 1; min-width: 0;
    }
    .print-pair .print-page + .print-page {
      border-left: 3px solid #374151;
      padding-left: 10px;
    }

    /* ── FULL-WIDTH PAGE (meal plan, calendar, etc.) ── */
    .print-page-full {
      background: white;
      max-width: 297mm;
      margin: 12px auto;
      padding: 4mm 5mm;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      border-radius: 4px;
    }

    /* ── PRINT PAGE (used inside pairs) ── */
    .print-page {
      background: white;
    }

    /* ── DAY HEADER ── */
    .day-header {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px; margin-bottom: 5px;
      border-bottom: 2px solid var(--orange);
      background: linear-gradient(135deg, #d95f2b, #e8845a);
      border-radius: 5px 5px 0 0;
      color: white;
    }
    .day-header.cardio { border-color: var(--blue); background: linear-gradient(135deg, #2980b9, #4fa3d9); }
    .day-header.recovery { border-color: var(--green); background: linear-gradient(135deg, #2e9e6b, #4fc08d); }
    .day-header.rest { border-color: var(--grey); background: linear-gradient(135deg, #6b7280, #8d95a1); }
    .day-header.endurance { border-color: var(--purple); background: linear-gradient(135deg, #7c4daa, #9b72c4); }

    .day-badge {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 800; color: white;
      background: #e8845a; flex-shrink: 0;
      border: 1.5px solid #f0a882;
    }
    .day-badge.cardio { background: #4fa3d9; border-color: #7bbde6; }
    .day-badge.recovery { background: #4fc08d; border-color: #7dd4aa; }
    .day-badge.rest { background: #8d95a1; border-color: #a8aeb7; }
    .day-badge.endurance { background: #9b72c4; border-color: #b494d4; }

    .day-header h2 { font-size: 0.92rem; font-weight: 800; color: white; }
    .day-header .subtitle { font-size: 0.64rem; color: #f0e6df; margin-top: 0; }

    .week-label {
      margin-left: auto; font-size: 0.62rem; font-weight: 800;
      padding: 2px 8px; border-radius: 20px;
      background: #e8845a; color: white;
      border: 1.5px solid #f0a882;
    }
    .cardio .week-label { background: #4fa3d9; border-color: #7bbde6; }
    .recovery .week-label { background: #4fc08d; border-color: #7dd4aa; }
    .rest .week-label { background: #8d95a1; border-color: #a8aeb7; }
    .endurance .week-label { background: #9b72c4; border-color: #b494d4; }

    /* ── EXERCISE TABLE ── */
    .ex-table { width: 100%; border-collapse: collapse; margin-top: 2px; }
    .ex-table th {
      text-align: left; font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: white; padding: 3px 4px;
      border-bottom: 1.5px solid #d1d5db;
      background: #374151;
    }
    .ex-table td {
      font-size: 0.7rem; padding: 3px 4px;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: top;
      line-height: 1.25;
    }
    .ex-table tbody tr:nth-child(even) td { background: #f7f8fa; }
    .ex-table tr:last-child td { border-bottom: none; }
    .ex-table .ex-name { font-weight: 700; min-width: 120px; }
    .ex-table .ex-detail { color: var(--text-soft); font-size: 0.64rem; }
    .ex-table .ex-sets { font-weight: 800; white-space: nowrap; color: #1e293b; }
    .ex-table .checkbox-col { width: 22px; text-align: center; }
    .checkbox-box {
      width: 14px; height: 14px; border: 2px solid #9ca3af;
      border-radius: 4px; display: inline-block;
    }

    .ex-table tr.warmup td { background: #fde9d5; border-left: 3px solid var(--orange); }
    .ex-table tr.cooldown td { background: #d6eaf8; border-left: 3px solid var(--blue); }
    .ex-table tr.flex td { background: #ede4f7; border-left: 3px solid var(--purple); }
    .ex-table tr.hiit td { background: #fcd5d5; border-left: 3px solid #dc2626; }

    /* ── SECTION DIVIDER ── */
    .section-divider {
      font-size: 0.6rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text);
      margin: 6px 0 2px; padding-left: 6px;
      border-left: 3px solid var(--orange);
    }

    /* ── MEAL TABLE ── */
    .meal-table { width: 100%; border-collapse: collapse; }
    .meal-table th {
      text-align: left; font-size: 0.6rem; font-weight: 700;
      text-transform: uppercase; padding: 3px 4px;
      background: linear-gradient(135deg, #2e9e6b, #4fc08d);
      border-bottom: 1.5px solid #2e9e6b; color: white;
    }
    .meal-table td {
      font-size: 0.64rem; padding: 2.5px 3px;
      border-bottom: 1px solid #e5e7eb;
      line-height: 1.25;
    }
    .meal-table tbody tr:nth-child(even) td { background: #f0faf5; }
    .meal-table .day-col { font-weight: 800; width: 30px; color: var(--green); }
    .meal-table .emoji { font-size: 0.72rem; }

    /* ── NOTES AREA ── */
    .notes-area {
      margin-top: 4px; padding-top: 3px;
      border-top: 1.5px dashed #9ca3af;
    }
    .notes-area h4 {
      font-size: 0.6rem; font-weight: 800; text-transform: uppercase;
      color: var(--text); margin-bottom: 2px;
    }
    .notes-lines {
      display: flex; flex-direction: column; gap: 8px;
    }
    .notes-lines .line {
      border-bottom: 1px solid #e5e7eb; height: 1px;
    }

    /* ── FOOTER ── */
    .page-footer {
      margin-top: 4px; padding-top: 2px;
      border-top: 1.5px solid #e5e7eb;
      display: flex; justify-content: space-between;
      font-size: 0.58rem; color: #6b7280; font-weight: 600;
    }

    /* ── WEIGHT CALENDAR ── */
    .cal-grid-print {
      width: 100%; border-collapse: collapse; margin-top: 4px;
    }
    .cal-grid-print th {
      font-size: 0.6rem; font-weight: 800; text-transform: uppercase;
      padding: 3px 2px; text-align: center;
      background: linear-gradient(135deg, #d95f2b, #e8845a);
      border: 1px solid #c4521f; color: white;
    }
    .cal-grid-print td {
      border: 1px solid #d1d5db; width: 14.28%;
      height: 45px; vertical-align: top; padding: 2px 3px;
    }
    .cal-grid-print td.empty { background: #f3f4f6; }
    .cal-date-print { font-size: 0.64rem; font-weight: 800; color: var(--orange); }
    .cal-weight-print {
      margin-top: 2px; font-size: 0.6rem; color: var(--text-soft);
      border-bottom: 1.5px dotted #9ca3af; display: inline-block;
      min-width: 35px; text-align: center;
    }
    .cal-summary-print {
      display: flex; gap: 8px; margin-top: 6px; padding: 5px;
      border: 2px solid var(--orange); border-radius: 6px;
      background: linear-gradient(135deg, #fef3ee, #fff7ed);
    }
    .cal-summary-print div {
      font-size: 0.66rem; flex: 1; text-align: center; font-weight: 600;
    }
    .cal-summary-print strong { color: var(--orange); font-weight: 800; }

    /* ── MEASUREMENTS & WELLNESS PRINT ── */
    .measure-table-print { width: 100%; border-collapse: collapse; margin-top: 4px; table-layout: fixed; }
    .measure-table-print th {
      font-size: 0.58rem; font-weight: 700; text-transform: uppercase;
      padding: 3px 4px; text-align: center;
      background: linear-gradient(135deg, #7c4daa, #9b72c4);
      border: 1px solid #6a3d96; color: white;
    }
    .measure-table-print th:first-child { width: 22%; text-align: left; }
    .measure-table-print td {
      border: 1px solid #e5e7eb; padding: 3px 4px; text-align: center;
      font-size: 0.66rem; height: 22px;
    }
    .measure-table-print tbody tr:nth-child(even) td { background: #f5f0fa; }
    .wellness-table-print { width: 100%; border-collapse: collapse; margin-top: 4px; table-layout: fixed; }
    .wellness-table-print th {
      font-size: 0.56rem; font-weight: 700; text-transform: uppercase;
      padding: 3px 2px; text-align: center;
      background: linear-gradient(135deg, #2e9e6b, #4fc08d);
      border: 1px solid #268a5b; color: white;
    }
    .wellness-table-print th:first-child { width: 22%; text-align: left; }
    .wellness-table-print td {
      border: 1px solid #e5e7eb; padding: 3px 2px; text-align: center;
      font-size: 0.64rem;
    }
    .wellness-table-print td:first-child { text-align: left; font-weight: 700; }
    .wellness-table-print tbody tr:nth-child(even) td { background: #f0faf5; }
    .wellness-table-print td .well-check { width: 12px; height: 12px; border: 2px solid #9ca3af; border-radius: 4px; display: inline-block; }

    /* ── MOTIVATIONAL FOOTER ── */
    .pair-footer {
      width: 100%; margin-top: auto; padding-top: 6px;
      border-top: 1.5px dashed #d1d5db;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.58rem; color: var(--text-soft);
    }
    .pair-footer .quote {
      font-style: italic; font-weight: 600; color: var(--text);
    }
    .pair-footer .tag {
      font-weight: 700; color: var(--orange);
      padding: 1px 6px; border: 1.5px solid var(--orange);
      border-radius: 10px; font-size: 0.52rem; text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="controls no-print">

  <label>Show:</label>
  <select id="viewSelect" onchange="render()">
    <option value="all">All Weeks (28 pages)</option>

    <option value="2">Week 2 only</option>
    <option value="3">Week 3 only</option>
    <option value="4">Week 4 only</option>
    <option value="meals">Meal Plan only</option>
    <option value="calendar">Weight Calendar (Apr + May)</option>
    <option value="wellness">Wellness & Measurements</option>
  </select>
  <button class="btn btn-print" onclick="window.print()">Print / Save PDF</button>
  <a href="index.html" class="btn btn-back" style="text-decoration:none;">Back to App</a>
</div>

function buildCalendarPage(monthOffset) {
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAY_HDRS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const baseMonth = 3; // April
  const baseYear = 2026;
  let y = baseYear, m = baseMonth + monthOffset;
  while (m > 11) { m -= 12; y++; }
  while (m < 0) { m += 12; y--; }

  const daysInMonth = new Date(y, m + 1, 0).getDate();
  let startDow = new Date(y, m, 1).getDay();
  startDow = startDow === 0 ? 6 : startDow - 1; // Mon=0

  let rows = '';
  let cells = [];
  // Empty cells
  for (let i = 0; i < startDow; i++) cells.push('<td class="empty"></td>');
  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push(`<td><div class="cal-date-print">${d}</div><div class="cal-weight-print">_____ kg</div></td>`);
  }
  // Pad end
  while (cells.length % 7 !== 0) cells.push('<td class="empty"></td>');
  // Build rows
  for (let i = 0; i < cells.length; i += 7) {
    rows += '<tr>' + cells.slice(i, i + 7).join('') + '</tr>';
  }

  return `<div class="print-page-full">
    <div class="day-header" style="border-color: var(--orange);">
      <div class="day-badge" style="background: var(--orange);">📅</div>
      <div>
        <h2>Weight Log — ${MONTH_NAMES[m]} ${y}</h2>
        <div class="subtitle">Track your weight daily · Weigh first thing in the morning</div>
      </div>
    </div>
    <table class="cal-grid-print">
      <thead><tr>${DAY_HDRS.map(d => '<th>' + d + '</th>').join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="cal-summary-print">
      <div>Start: <strong>_____ kg</strong></div>
      <div>End: <strong>_____ kg</strong></div>
      <div>Change: <strong>_____ kg</strong></div>
      <div>Goal: <strong>_____ kg</strong></div>
    </div>
    <div class="notes-area">
      <h4>Notes</h4>
      <div class="notes-lines">
        <div class="line"></div><div class="line"></div><div class="line"></div>
      </div>
    </div>
    <div class="page-footer">
      <span>FitPlan — Weight Log, ${MONTH_NAMES[m]} ${y}</span>
      <span>Tip: Weigh at the same time daily for consistency</span>
    </div>
  </div>`;
}

// Pair two days side-by-side on one landscape A4 page.
// Per week: [Mon+Tue], [Wed+Thu], [Fri+Sat], [Sun + Meal Plan]
const DAY_PAIRS = [[0,1],[2,3],[4,5]]; // indices into SCHEDULE; Sun (6) paired with meals

const QUOTES = [
  '"The only bad workout is the one you didn\'t do." — You got this!',
  '"Consistency beats perfection. Show up, even on hard days."',
  '"Stronger than yesterday, building tomorrow\'s you."',
  '"Small daily improvements lead to extraordinary results."',
  '"Your body can do it. It\'s your mind you need to convince."',
  '"Don\'t wish for it — work for it. One rep at a time."',
  '"Progress, not perfection. Every set counts."',
  '"The pain you feel today is the strength you feel tomorrow."',
];
let quoteIdx = 0;

function buildPair(left, right, showQuote) {
  const q = showQuote !== false ? QUOTES[quoteIdx++ % QUOTES.length] : '';
  const footer = q ? `<div class="pair-footer"><span class="quote">${q}</span><span class="tag">FitPlan</span></div>` : '';
  return `<div class="print-pair"><div class="pair-content">${left}${right || ''}</div>${footer}</div>`;
}

function buildWeekPages(w, includeMeals) {
  let html = '';
  DAY_PAIRS.forEach(pair => {
    html += buildPair(buildDayPage(SCHEDULE[pair[0]], w), buildDayPage(SCHEDULE[pair[1]], w));
  });
  // Sun (index 6) paired with meal plan
  if (includeMeals) {
    html += buildPair(buildDayPage(SCHEDULE[6], w), buildMealPage());
  } else {
    html += buildPair(buildDayPage(SCHEDULE[6], w));
  }
  return html;
}

function render() {
  const view = document.getElementById('viewSelect').value;
  let html = '';

  if (view === 'meals') {
    html = `<div class="print-pair">${buildMealPage()}</div>`;
  } else if (view === 'calendar') {
    html = buildCalendarPage(0) + buildCalendarPage(1);
  } else if (view === 'wellness') {
    html = buildPair(buildMeasurePage(), buildWellnessPage());
  } else if (view === 'all') {
    for (let w = 1; w <= 4; w++) {
      html += buildWeekPages(w, true);
    }
    html += buildCalendarPage(0);
    html += buildCalendarPage(1);
    html += buildPair(buildMeasurePage(), buildWellnessPage());
  } else {
    const w = parseInt(view);
    html += buildWeekPages(w, true);
  }

  document.getElementById('pages').innerHTML = html;
}

render();
